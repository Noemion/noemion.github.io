name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up locked Ruby and Bundler
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true
      - name: Validate Jekyll sources
        run: python3 tests/terminology_test.py && python3 tests/spec_contract_test.py && python3 tests/diagnostic_vector_test.py && python3 tests/adapter_vector_test.py && python3 tests/identity_vector_test.py && python3 tests/text_identifier_vector_test.py && python3 tests/authority_vector_test.py && python3 tests/semantic_vector_test.py && python3 tests/result_domain_vector_test.py && python3 tests/time_scope_vector_test.py && python3 tests/negation_vector_test.py && python3 tests/quantification_vector_test.py && python3 tests/measurement_vector_test.py && python3 tests/composition_vector_test.py && python3 tests/endem_closure_vector_test.py && python3 tests/session_contract_vector_test.py && python3 tests/evidence_entry_vector_test.py && python3 tests/p2_payload_test.py && python3 tests/source_manifest_test.py && python3 tests/site_quality_test.py
      - name: Validate JavaScript syntax
        run: node --check assets/site.mjs && node --check assets/theme.js && node --check assets/mobile-directory-guard.js && for file in assets/modules/*.mjs; do node --check "$file"; done
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Publish Markdown discovery index
        run: sudo install -m 0644 sitemap.md _site/sitemap.md
      - name: Validate rendered site
        run: python3 tests/site_quality_test.py _site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
