items:
  - id: scope-and-trust
    state: confirmed
    label: 已完成
    title: 项目定位与信任原则设计
    description: 已完成项目定位、非目标、Strict 无模型边界、模型输出不可信、对象输入不可信和歧义保留原则的公开设计。
  - id: object-and-toolchain-boundaries
    state: confirmed
    label: 已完成
    title: 核心对象与工具链职责划分
    description: 已完成 GSIR、GOBJ、SSO、Compiler Core、Linker/Loader 与 Runtime 的职责边界和公开架构入口设计。
  - id: specification-binary-core-design
    state: current
    label: 正在进行
    title: 最小规范与安全二进制核心设计
    description: 正在收敛对象语义、格式边界、错误语义、资源限制、checked arithmetic、不变量，以及合法与畸形样本的最低集合。
  - id: secure-binary-core-validation
    state: next
    label: 计划开发
    title: 安全二进制核心实现与验证
    description: 计划实现 Checked Reader/Writer、结构验证器、Round-trip、Malformed 与 Fuzz 拒绝路径，并形成可重复验证结果。
  - id: strict-compile-and-link
    state: future
    label: 后续规划
    title: 文本 IR、Strict 编译与链接
    description: 规划规范化文本往返、确定性 Compiler Core、符号解析、重定位、归档、依赖闭包和链接一致性工作。
  - id: trusted-load-and-assisted
    state: future
    label: 后续规划
    title: 可信装载、发布与模型辅助
    description: 规划签名装载、最小 Runtime、SSO 发布，以及只提交不可信候选的 Assisted 前端能力。
