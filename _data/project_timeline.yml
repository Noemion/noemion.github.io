items:
  - id: scope-and-trust
    state: confirmed
    label: 已完成
    title: 项目定位与信任原则设计
    description: 已完成范围、非目标、无模型确定性、模型与对象输入不可信、歧义保留和证据验收原则。
  - id: endem-vocabulary-topology
    state: confirmed
    label: 已完成
    title: Endem 词汇与单一应用拓扑
    description: 已将旧对象与工具家族收敛为 Endem、Weave、Frame、Witness 和唯一公开 CLI endem；旧入口不保留兼容别名。
  - id: endem-specification-core-design
    state: current
    label: 正在进行
    title: 最小规范与安全核心设计
    description: 正在收敛五组投影语义、关系位置、编码边界、错误语义、checked arithmetic、资源限制和合法/畸形样本。
  - id: endem-core-validation
    state: next
    label: 计划开发
    title: form/check/see/test 纵向切片
    description: 计划实现规范 Writer、生产 Reader、独立只读 Reader、往返、恶意语料、模糊测试和双环境复现。
  - id: weave-binding-release
    state: future
    label: 后续规划
    title: Weave 组合与外部签名发布
    description: 只有真实多 Endem 消费者成立后，才开发 bind、pack、seal、冲突矩阵、固定依赖和 Debug Companion。
  - id: controlled-run
    state: future
    label: 后续规划
    title: Frame、Runner 与 Witness
    description: 先用规则型后端验证重新装载、能力控制、真实观察、证据闭包和验收分层，随后再评估模型及外部协议适配。
