current:
  summary: 项目已采用 Endem 命题投影语义与单一应用拓扑。当前工作是定义 say、mean、case、when、open 的安全编码、关系不变量、资源上限、错误语义与正反向量；随后才实现 form、check、独立 see 和 test。
  facts:
    - label: 已完成
      value: Endem 词汇与应用拓扑决定
    - label: 正在进行
