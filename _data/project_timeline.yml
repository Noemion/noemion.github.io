current:
  summary: 项目已采用 Endem 原生六语义面、事态分层与单一应用拓扑。当前工作是定义 rhem、semion、skena、telis、krin、apor 的安全编码、关系不变量、资源上限、错误语义与正反向量；随后才实现 poie、elenk、独立 theor 和 peira。
  facts:
    - label: 已完成
      value: Endem 词汇与应用拓扑决定
    - label: 正在进行
