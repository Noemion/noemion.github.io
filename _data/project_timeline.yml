current:
  summary: 项目已公开 END-CORE、END-FMT 和 END-P1 完整载荷向量，并通过 C/Rust 实验选择 Rust 作为 Poiet 与生产读取核心语言。当前开始 poie/elenk/theor/peira 最小纵向切片。
  facts:
    - label: 已完成
      value: Endem 词汇与应用拓扑决定
    - label: 正在进行
      value: 规范、威胁模型与验证方案
    - label: 后续工作
      value: 用户明确开启代码阶段后再确定

items:
  - id: scope-and-trust
    state: confirmed
    label: 已完成
    title: 项目定位与信任原则设计
    description: 已完成范围、非目标、无模型确定性、模型与对象输入不可信、歧义保留和证据验收原则。
  - id: endem-vocabulary-topology
    state: confirmed
    label: 已完成
    title: Endem 词汇与单一应用拓扑
    description: 已将旧对象与工具家族收敛为 Endem、Synem、Dromen、Tekmor 和唯一公开 CLI endem；旧入口不保留兼容别名。
  - id: endem-specification-core-design
    state: confirmed
    label: 已完成
    title: 最小规范与安全核心设计
    description: 已形成语义与容器条款、END-P0 结构实验、END-P1 封闭载荷、错误目录和正反规范字节，并用 P0-LANG-001 选择首版核心语言。
  - id: endem-core-validation
    state: current
    label: 尚未开始
    title: poie/elenk/theor/peira 纵向切片
    description: 当前没有组件实现或实现仓库。只有用户明确开启代码开发阶段后，项目才会重新确认仓库、范围、候选语言、依赖和验证门禁。
  - id: synem-binding-release
    state: future
    label: 后续规划
    title: Synem 组合与外部签名发布
    description: 只有出现真实的多 Endem 消费者后，才开发 pleko、tasse、sphra、冲突矩阵、固定依赖和调试伴随记录。
  - id: controlled-praxe
    state: future
    label: 后续规划
    title: Dromen、Praxor 与 Tekmor
    description: 先用规则型后端验证重新装载、能力控制、真实观察、证据闭包和验收分层，随后再评估模型及外部协议适配。
