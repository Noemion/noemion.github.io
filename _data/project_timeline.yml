current:
  summary: 项目已公开 END-CORE、END-FMT、END-P0 和首组语义/字节向量，并通过 C/Rust 双原型、差分、Sanitizer、模糊和重复构建选择 Rust 作为 Poiet 与生产读取核心语言。当前开始 poie/elenk/theor/peira 最小纵向切片。
  facts:
    - label: 已完成
