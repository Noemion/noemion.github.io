current:
  summary: 项目范围、非目标和信任原则已经形成公开说明。当前工作是收敛 Noema IR、Noema Object 与 Horizon Object 的最小规范，并定义安全读取器、对象写入器和验证器的接口；随后才开始实现安全对象核心。
  facts:
