current:
  summary: 项目已经建立可定位的规范草案、威胁模型、场景和正反向量。当前工作是继续检验对象边界、术语必要性和失败语义，并补齐真实使用者的读音证据；这些资料不表示组件已经实现。
  facts:
    - label: 已有成果
      value: 规范草案、对象职责与验证材料
    - label: 正在进行
      value: 术语、反例、威胁与证据边界复核
    - label: 限制条件
      value: 没有组件、安装包或发行读音

items:
  - id: scope-and-trust
    state: confirmed
    label: 已有成果
    title: 问题范围与信任原则
    description: 已说明项目要固定期望终态与验收依据，并把模型候选、外部状态、授权、观察、满足判断和最终决定分开。
  - id: endem-vocabulary-topology
    state: confirmed
    label: 已有成果
    title: 对象职责与单一应用边界
    description: Endem、组合闭包、会话契约和有范围证据承担不同职责，未来公开入口收敛为一个应用；具体发行拼写和读音仍在研究。
  - id: endem-specification-core-design
    state: confirmed
    label: 已有成果
    title: 规范草案与验证材料
    description: 已形成内容、容器、封闭 Profile、诊断、适配、身份、文本和授权边界，并用登记、场景与正反向量连接条款；这些材料只证明资料关系可检查。
  - id: specification-validation
    state: current
    label: 正在进行
    title: 术语、反例与证据边界复核
    description: 当前继续检查专名是否必要、相邻术语能否口头区分、案例是否存在反例，以及每项验证最多支持什么主张；发行读音尚无人类研究结果。
  - id: deterministic-core
    state: future
    label: 后续规划
    title: 最小形成与独立检查路径
    description: 若项目进入组件实现，先形成确定性写入、分层检查和独立只读解释路径，并用畸形输入、差分结果、资源上限和双环境复现限定主张。
  - id: controlled-drase
    state: future
    label: 后续规划
    title: 组合、受控运行与外部适配
    description: 只有出现真实消费者并完成前置验证后，才评估多目标组合、外部签名、受限运行、模型和协议适配；没有不可替代价值时省略相应能力。
