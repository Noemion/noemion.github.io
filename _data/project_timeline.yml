current:
  summary: 项目已建立 Endem 内容标准分层、Synem 组合闭包、Dromen 会话契约、Tekmor 证据边界、跨对象结构化诊断、外部协议适配以及精确内容身份与签名边界。当前继续用条款、威胁、场景和正反向量验证资料一致性，不开发组件。
  facts:
    - label: 已完成
      value: Endem 内容标准与对象边界
    - label: 正在进行
      value: 规范、威胁模型与验证方案
    - label: 后续工作
      value: 用户明确开启代码阶段后再确定

items:
  - id: scope-and-trust
    state: confirmed
    label: 已完成
    title: 项目定位与信任原则设计
    description: 已完成范围、非目标、无模型确定性、模型与对象输入不可信、歧义保留和证据验收原则。
  - id: endem-vocabulary-topology
    state: confirmed
    label: 已完成
    title: Endem 词汇与单一应用拓扑
    description: 已将旧对象与工具家族收敛为 Endem、Synem、Dromen、Tekmor 和唯一公开 CLI endem；旧入口不保留兼容别名。
  - id: endem-specification-core-design
    state: confirmed
    label: 已完成
    title: 最小规范与安全核心设计
    description: 已形成语义与容器条款、END-P0 结构实验、END-P1 封闭载荷、DIA-CORE 诊断边界、ADP-CORE 外部适配边界、ID-CORE 精确身份与签名边界、跨对象诊断目录和正反规范字节，并用 P0-LANG-001 选择未来候选语言。
  - id: specification-validation
    state: current
    label: 正在进行
    title: 规范分层与证据边界验证
    description: 当前只完善 END-CORE 内容标准、Profile、Synem、Dromen、Tekmor、DIA-CORE、ADP-CORE、ID-CORE、威胁模型、自然语言场景与正反向量；这些检查不表示 Poiet、Theor、Praxor、诊断系统、协议适配器、密码组件或 CLI 已经实现。
  - id: synem-binding-release
    state: future
    label: 后续规划
    title: Synem 组合与外部签名发布
    description: 只有出现真实的多 Endem 消费者后，才开发 pleko、tasse、sphra、冲突矩阵、固定依赖和调试伴随记录。
  - id: controlled-praxe
    state: future
    label: 后续规划
    title: Dromen、Praxor 与 Tekmor
    description: DRO-CORE 已固定一次会话契约；进入代码阶段后再用规则型后端验证重新装载、能力求交、预算、漂移失效、真实观察、有范围证据和验收分层，随后评估模型及外部协议适配。
