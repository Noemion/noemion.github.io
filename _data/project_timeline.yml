current:
  summary: Noemion 当前仍处于设计阶段。工作重点是收敛 GSIR、GOBJ、SSO 的最小规范边界，并为安全 Reader/Writer、验证器、合法样本和畸形语料定义可以实现和测试的契约；尚未发布可执行工具、稳定 ABI 或正式规范制品。
  facts:
    - label: 当前性质
      value: 规范与核心设计
    - label: 当前焦点
      value: 可测试条款与拒绝路径
    - label: 发布结论
      value: 尚无稳定制品

items:
  - id: scope-and-trust
    state: confirmed
    label: 已确认
    title: 问题、范围与信任原则
    description: 项目定位、Strict 无模型边界、模型输出不可信、对象输入不可信、歧义优先保留等原则已经进入公开项目定义。
  - id: specification-binary-core-design
    state: current
    label: 当前阶段
    title: 规范与安全二进制核心设计
    description: 正在收敛对象语义、格式边界、错误语义、资源限制、checked arithmetic、不变量以及合法与畸形样本的最低集合。
  - id: secure-binary-core-validation
    state: next
    label: 下一阶段
    title: 安全二进制核心实现与验证
    description: 在规范条款和 ADR 足够稳定后，实现 Checked Reader/Writer、结构验证器、Round-trip、Malformed 与 Fuzz 拒绝路径。
  - id: strict-compile-and-link
    state: future
    label: 未来阶段
    title: 文本 IR、Strict 编译与链接
    description: 逐步进入规范化文本往返、确定性 Compiler Core、符号解析、重定位、归档、依赖闭包和链接一致性。
  - id: trusted-load-and-assisted
    state: future
    label: 未来阶段
    title: 可信装载、发布与模型辅助
    description: 只有前序安全核心和一致性门通过后，才评估签名装载、最小 Runtime、SSO 发布以及提交不可信候选的 Assisted 前端。
