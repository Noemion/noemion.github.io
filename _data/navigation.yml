global:
  - key: project
    href: /about/index.html
    label: 项目
    kicker: 建立共同语境
    description: 从人的自然语言目标、人工智能行动和工程责任边界理解 Noemion 为什么存在。
    items:
      - { href: /about/background.html, label: 背景与边界, description: 为什么目标语义需要成为工程对象, cover: background, cover_label: "EXPRESSION ≠ IDENTITY" }
      - { href: /architecture/index.html, label: 架构设计, description: 从确定性成形、组合到受控实现的职责分层, cover: architecture, cover_label: "TRUST BOUNDARIES" }
      - { href: /about/intellectual-foundations.html, label: 思想与方法, description: 区分思想启发、工程类比与可验证结论, cover: foundations, cover_label: "METHOD / BOUNDARY" }
      - { href: /faq/index.html, label: 常见问题, description: 直接回答项目范围、状态与非目标, cover: faq, cover_label: "SCOPE CHECK" }
  - key: specifications
    href: /specifications/index.html
    label: 规范
    kicker: 定义权威边界
    description: 查看 Endem、组合闭包、会话契约、范围证据与授权边界。
    items:
      - { href: /specifications/endem.html, label: Endem, description: 最小自然语言目标制品与六个语义面, cover: endem-spec, cover_label: "SIGN → SITUATION" }
      - { href: /specifications/synem.html, label: Synem, description: 固定多个目标及其全部必需依赖, cover: synem, cover_label: "RESOLVED CLOSURE" }
      - { href: /specifications/dromen.html, label: Dromen, description: 一次运行的只读会话契约, cover: dromen, cover_label: "SESSION CONTRACT" }
      - { href: /specifications/iknem.html, label: Iknem, description: 限定对象、方法与结论范围的证据记录, cover: iknem, cover_label: "SCOPED EVIDENCE" }
  - key: endem
    href: /endem/index.html
    label: 应用
    kicker: 形成、检查与运行
    description: 进入 Noemion 的 Endem 应用，查看确定性制品工程和受限运行。
    items:
      - { href: /endem/index.html, label: Endem 应用, description: 按形成、检查、组合和受限运行任务理解单一命令入口, cover: endem, cover_label: "ONE COMMAND" }
      - { href: /endem/docs/format.html, label: 格式与形成, description: 定义规范字段、编码与确定性形成, cover: format, cover_label: "KTISE / ELENK" }
      - { href: /endem/docs/safety.html, label: 安全与证据, description: 检查有界读取、独立观察与签名边界, cover: theor, cover_label: "ELENK / THEOR" }
      - { href: /endem/docs/running.html, label: 装载与运行, description: 理解 Dromen、能力、phain 与 Iknem, cover: drase, cover_label: "SIGN / DRASE" }
  - key: docs
    href: /docs/index.html
    label: 指南
    kicker: 选择阅读路径
    description: 按入门、架构设计、开发、应用和规范主题选择指南或参考资料。
    items:
      - { href: /docs/getting-started.html, label: 入门指南, description: 从问题背景和核心对象开始, cover: getting-started, cover_label: "START PATH" }
      - { href: /docs/architecture-guide.html, label: 架构设计指南, description: 理解生命周期、边界与失败路径, cover: architecture-guide, cover_label: "BOUNDARY GUIDE" }
      - { href: /docs/endem-reference.html, label: Endem 应用参考, description: 查找 Endem 动作与组件职责, cover: application-reference, cover_label: "ACTION MAP" }
      - { href: /docs/specifications-reference.html, label: 规范参考指南, description: 查找权威来源、当前状态和 ADR 阅读顺序, cover: spec-reference, cover_label: "SPEC AUTHORITY" }
      - { href: /endem/docs/index.html, label: Endem 使用手册, description: 查找格式、绑定、安全、运行和参考主题, cover: endem-manual, cover_label: "ENDEM MANUAL" }
  - key: development
    href: /development/index.html
    label: 开发
    kicker: 以证据推进
    description: 判断当前可贡献的工作、所需证据、停止条件和问题报告入口。
    items:
      - { href: /development/current-stage.html, label: 当前项目阶段, description: 已完成工作、正在推进内容与后续规划, cover: current-stage, cover_label: "ACTIVE WORK" }
      - { href: /development/implementation-roadmap.html, label: 开发路线图, description: 当前工作、推进条件与停止条件, cover: roadmap, cover_label: "DELIVERY PATH" }
      - { href: /development/testing.html, label: 测试与验证, description: 确定性、模糊测试、威胁与一致性验证, cover: testing, cover_label: "REJECT MATRIX" }
      - { href: /news/index.html, label: 项目动态, description: 只登记可核对的项目进展, cover: news, cover_label: "VERIFIED SIGNAL" }
      - { href: /downloads/index.html, label: 资源状态, description: 版本、签名和发布资源的真实状态, cover: downloads, cover_label: "SIGNED PACKAGE" }

