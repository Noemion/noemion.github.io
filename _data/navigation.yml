global:
  - key: project
    href: /about/index.html
    label: 项目
    kicker: 建立共同语境
    description: 了解 Noemion 为什么把人的目标、人工智能行动和最终验收分开处理。
    items:
      - { href: /about/index.html, label: 项目与边界, description: Noemion 研究什么，不替代什么，目前做到哪里, cover: background, cover_label: "GOAL / RESPONSIBILITY" }
      - { href: /architecture/index.html, label: 架构设计, description: 一项目标怎样经过形成、运行、观察和验收, cover: architecture, cover_label: "TRUST BOUNDARIES" }
      - { href: /about/intellectual-foundations.html, label: 思想与方法, description: 哲学怎样帮助提出问题，又为什么不能替代工程证据, cover: foundations, cover_label: "METHOD / BOUNDARY" }
      - { href: /faq/index.html, label: 常见问题, description: 直接回答项目范围、状态与非目标, cover: faq, cover_label: "SCOPE CHECK" }
  - key: specifications
    href: /specifications/index.html
    label: 规范
    kicker: 定义权威边界
    description: 查看目标、组合、一次运行、实际观察和授权分别遵循什么规则。
    items:
      - { href: /specifications/endem.html, label: Endem, description: 一个目标怎样保存来源、意思、期望结果和验收条件, cover: endem-spec, cover_label: "SIGN → SITUATION" }
      - { href: /specifications/endem-closure.html, label: closure, description: 怎样把多个相互依赖的目标固定成完整集合, cover: closure, cover_label: "RESOLVED CLOSURE" }
      - { href: /specifications/session-contract.html, label: contract, description: 怎样限定一次运行可以使用的对象、能力和预算, cover: session, cover_label: "SESSION CONTRACT" }
      - { href: /specifications/evidence-entry.html, label: evidence, description: 怎样记录实际观察、方法、覆盖范围和限制, cover: evidence, cover_label: "SCOPED EVIDENCE" }
  - key: endem
    href: /endem/index.html
    label: 应用
    kicker: 形成、检查与运行
    description: 查看计划中的 Endem 命令怎样形成、检查、组合和受限运行目标。
    items:
      - { href: /endem/index.html, label: Endem 应用, description: 从一个入口理解形成、检查、组合和运行准备, cover: endem, cover_label: "ONE COMMAND" }
      - { href: /endem/docs/format.html, label: 格式与形成, description: 人的目标要保留哪些信息，怎样形成初始制品, cover: format, cover_label: "FORM / LINT" }
      - { href: /endem/docs/safety.html, label: 安全与证据, description: 为什么写入程序不能独自证明自己的输出正确, cover: inspector, cover_label: "LINT / INSPECT" }
      - { href: /endem/docs/running.html, label: 装载与运行, description: 运行前怎样重新核对目标、权限、环境和证据责任, cover: runner, cover_label: "SIGN / RUN" }
  - key: docs
    href: /docs/index.html
    label: 指南
    kicker: 选择阅读路径
    description: 按入门、架构设计、开发、应用和规范主题选择指南或参考资料。
    items:
      - { href: /docs/getting-started.html, label: 入门指南, description: 从问题背景和核心对象开始, cover: getting-started, cover_label: "START PATH" }
      - { href: /docs/architecture-guide.html, label: 架构设计指南, description: 理解生命周期、边界与失败路径, cover: architecture-guide, cover_label: "BOUNDARY GUIDE" }
      - { href: /endem/docs/reference.html, label: Endem 动作索引, description: 按开发任务查动作、对象、结果和失败责任, cover: application-reference, cover_label: "ACTION MAP" }
      - { href: /specifications/index.html, label: 规范与查询, description: 从工程问题查权威来源、当前状态和阅读顺序, cover: spec-reference, cover_label: "SPEC AUTHORITY" }
      - { href: /endem/docs/index.html, label: Endem 使用手册, description: 查找格式、绑定、安全、运行和参考主题, cover: endem-manual, cover_label: "ENDEM MANUAL" }
  - key: development
    href: /development/index.html
    label: 开发
    kicker: 以证据推进
    description: 查看已经完成什么、当前研究什么，以及一项贡献需要留下哪些证据。
    items:
      - { href: /development/current-stage.html, label: 项目进展, description: 已有成果、当前工作、后续条件和近期可核对进展, cover: current-stage, cover_label: "ACTIVE WORK" }
      - { href: /development/implementation-roadmap.html, label: 开发路线图, description: 进入下一层需要什么证据，什么情况下应停止, cover: roadmap, cover_label: "DELIVERY PATH" }
      - { href: /development/testing.html, label: 测试与验证, description: 不同主张分别需要哪些支持案例、失败案例和验证, cover: testing, cover_label: "REJECT MATRIX" }
      - { href: /downloads/index.html, label: 资源与获取, description: 当前可以阅读什么，未来发行物必须提供什么证据, cover: downloads, cover_label: "SIGNED PACKAGE" }

