{% assign docs_manual_pages = site.pages | where: "manual_id", "docs" %}
{% assign endem_manual_pages = site.pages | where: "manual_id", "endem" %}
{% assign manual_pages = docs_manual_pages | concat: endem_manual_pages | sort: "permalink" %}
<script type="application/json" data-manual-directory-source>
{
  "manuals": {{ site.data.manuals | jsonify }},
  "pages": [
    {% for manual_page in manual_pages %}
    {
      "manualId": {{ manual_page.manual_id | jsonify }},
      "group": {{ manual_page.manual_group | jsonify }},
      "order": {{ manual_page.manual_order | jsonify }},
      "route": {{ manual_page.permalink | remove_first: '/' | jsonify }},
      "label": {{ manual_page.nav_title | default: manual_page.hero_title | jsonify }},
      "description": {{ manual_page.summary | default: manual_page.hero_description | jsonify }},
      "isIndex": {{ manual_page.manual_is_index | default: false | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
