<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | escape }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <script src="{{ '/assets/directory.js' | relative_url }}" defer></script>
</head>
<body data-page-role="{{ page.page_role }}">
<a class="skip-link" href="#main-content">跳到正文</a>
{% include site-header.html %}
{{ content }}
{% include site-footer.html %}
</body>
</html>
